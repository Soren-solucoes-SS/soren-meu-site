name: Deploy aplicattion

on:
  workflow_run: 
      workflows: ["Build and Push to Docker Hub"]
      types: 
        - completed

jobs:
  deployment-cloud-azure:
    name: deployment azure cloud
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - run: echo "deploy em produção"

    permissions:
     contents: read
     id-token: write

    steps:
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
     
      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy no Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ca-curriculum-api
          imageToDeploy: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/soren-curriculo:${{ env.IMAGE_TAG }}
          registryUrl: docker.io
          registryUsername: ${{ secrets.DOCKERHUB_USERNAME }}
          registryPassword: ${{ secrets.DOCKERHUB_TOKEN }}
